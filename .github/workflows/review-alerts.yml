name: Review Alert (Hourly)

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  alert-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run alert check for all salons
        run: python review_monitor.py
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          SEND_ALWAYS: "false"
      - name: Save state
        run: |
          git config user.name "review-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state_*.json
          git diff --staged --quiet || git commit -m "Update review state [skip ci]"
          git push
